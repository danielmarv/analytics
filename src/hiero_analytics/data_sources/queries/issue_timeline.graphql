query ISSUE_TIMELINE($owner:String!,$repo:String!,$number:Int!,$cursor:String){
  repository(owner:$owner,name:$repo){
    issue(number:$number){
      timelineItems(first:100, after:$cursor, itemTypes:[LABELED_EVENT, UNLABELED_EVENT, CLOSED_EVENT, REOPENED_EVENT]){
        pageInfo{
          hasNextPage
          endCursor
        }
        nodes{
          __typename
          ... on LabeledEvent{
            createdAt
            label{ name }
          }
          ... on UnlabeledEvent{
            createdAt
            label{ name }
          }
          ... on ClosedEvent{
            createdAt
          }
          ... on ReopenedEvent{
            createdAt
          }
        }
      }
    }
  }
  rateLimit{
    limit
    remaining
    cost
    resetAt
  }
}