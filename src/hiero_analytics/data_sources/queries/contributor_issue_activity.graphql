
query CONTRIBUTOR_ISSUE_ACTIVITY_QUERY($owner:String!, $repo:String!, $cursor:String) {
  repository(owner:$owner, name:$repo) {
    issues(
      first:100
      after:$cursor
      orderBy:{field:CREATED_AT, direction:DESC}
    ) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        number
        createdAt
        author {
          login
        }
      }
    }
  }
  rateLimit{
    limit
    remaining
    cost
    resetAt
  }
}